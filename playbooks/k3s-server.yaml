---
- name: Install k3s control plane
  hosts: fellowship_control_plane
  become: true

  vars:
    gateway_api_version: "v1.5.1"

  tasks:
    - name: Install k3s server
      shell: >
        curl -sfL https://get.k3s.io | sh -s - server
        --write-kubeconfig-mode 644
        --disable servicelb
        --disable traefik
        --flannel-backend=none
        --disable-network-policy
        --disable-kube-proxy 
        --node-ip {{ ansible_host }}
        --tls-san {{ ansible_host }}
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Wait for k3s to be ready
      command: kubectl get nodes
      register: result
      until: result.rc == 0
      retries: 10
      delay: 10

    - name: Get node token for workers
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Store token as fact
      set_fact:
        k3s_token: "{{ node_token.content | b64decode | trim }}"

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /tmp/k3s-kubeconfig.yaml
        flat: yes

    - name: Update kubeconfig server URL to control plane IP
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local
        ansible_become: false
      replace:
        path: /tmp/k3s-kubeconfig.yaml
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ hostvars['gandalf']['ansible_host'] }}:6443"

    - name: Rename kubeconfig entries from default to fellowship
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local
        ansible_become: false
      replace:
        path: /tmp/k3s-kubeconfig.yaml
        regexp: '{{ item.regexp }}'
        replace: '{{ item.replace }}'
      loop:
        - { regexp: 'current-context: default', replace: 'current-context: fellowship' }
        - { regexp: '    cluster: default', replace: '    cluster: fellowship' }
        - { regexp: '    user: default', replace: '    user: fellowship' }
        - { regexp: '  name: default', replace: '  name: fellowship' }
        - { regexp: '- name: default', replace: '- name: fellowship' }

    - name: Ensure ~/.kube directory exists locally
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local
        ansible_become: false
      file:
        path: "~/.kube"
        state: directory
        mode: '0700' # Strict permissions for safety

    - name: Move kubeconfig to local ~/.kube/config-fellowship
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local
        ansible_become: false
      copy:
        src: /tmp/k3s-kubeconfig.yaml
        dest: "~/.kube/config-fellowship"
        mode: '0600' # limiting permissions - security best practices

    - name: Install Gateway API CRDs
      command: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
