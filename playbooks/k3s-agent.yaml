---
- name: Install k3s workers
  hosts: fellowship_workers
  become: true
  
  vars:
    k3s_url: "https://{{ hostvars['gandalf']['ansible_host'] }}:6443"

  tasks:
    - name: Get k3s token from control plane
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token
      delegate_to: gandalf

    - name: Install k3s agent
      shell: >
        curl -sfL https://get.k3s.io | K3S_URL={{ k3s_url }} K3S_TOKEN={{ node_token.content | b64decode | trim }} sh -s - agent
        --node-ip {{ ansible_host }}
      args:
        creates: /var/lib/rancher/k3s/agent/kubelet.kubeconfig
