---
# Linux base play
- name: Base configuration for all managed Linux hosts
  hosts: linux_hosts
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - vim
          - htop
          - jq
          - prometheus-node-exporter
        state: present

    - name: Enable and start node_exporter
      systemd:
        name: prometheus-node-exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Ensure dalton user exists with sudo privileges
      user:
        name: dalton
        groups: sudo
        append: true
        shell: /bin/bash
        create_home: true
        state: present

    - name: Set up SSH authorized key for dalton
      authorized_key:
        user: dalton
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Set timezone
      timezone:
        name: America/Denver

    - name: Harden SSH - disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: restart sshd

    - name: Harden SSH - disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      when: ansible_user != 'root'
      notify: restart sshd

  handlers:
    - name: restart sshd
      systemd:
        name: ssh
        state: restarted

# Kubernetes play
- name: k3s node configuration
  hosts: k3s_all
  become: true

  tasks:
    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install k3s node packages
      apt:
        name:
          - nfs-common
        state: present

    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent
