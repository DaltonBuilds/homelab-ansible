---
- name: Install ZFS server
  hosts: nfs
  become: true

  tasks:
    - name: Install NFS and ZFS
      apt:
        name:
          - zfsutils-linux
          - nfs-kernel-server
          - zfs-auto-snapshot

    - name: Find unpartitioned data disk
      shell: |
        lsblk -dno NAME,TYPE | awk '$2=="disk" {print $1}' | sort | while read disk; do
          parts=$(lsblk -no NAME "/dev/$disk" | wc -l)
          if [ "$parts" -eq 1 ]; then
            echo "/dev/$disk"
            break
          fi
        done
      register: detected_data_disk
      changed_when: false
      failed_when: detected_data_disk.stdout | length == 0

    - name: Create ZFS pool
      shell: zpool create tank {{ detected_data_disk.stdout }}
      args:
        creates: /tank

    - name: Create ZFS dataset
      shell: zfs create tank/k8s
      args:
        creates: /tank/k8s

    - name: Set compression
      shell: zfs set compression=lz4 tank/k8s
 
    - name: Configure /etc/exports
      lineinfile:
        path: /etc/exports
        line: '{{ nfs_export_path }} 192.168.40.0/24(rw,sync,no_subtree_check,root_squash)'
        state: present
      notify: reload exports

    - name: Enable and start NFS server
      systemd:
        name: nfs-kernel-server
        state: started
        enabled: true

  handlers:
    - name: reload exports
      ansible.builtin.command: exportfs -ra
